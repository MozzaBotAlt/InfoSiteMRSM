<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Info TV Display</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="display-page">
  <div class="tv-shell">
    <header class="screen-top">
      <div class="brand-block">
        <div class="brand-badge">MRSM</div>
        <div>
          <div class="brand">Info TV</div>
          <div class="brand-subtitle">Live updates</div>
        </div>
      </div>
      <div id="clock" class="clock" aria-live="polite"></div>
    </header>

    <main class="split-stage">
      <section class="video-section">
        <div class="section-label">Video Montage</div>
        <div class="video-display">
          <div class="slide-media" id="slide-media"></div>
          <div class="slide-overlay">
            <div class="slide-overlay-top">
              <div class="slide-clock" id="clock"></div>
            </div>
            <p class="eyebrow">Now showing</p>
            <h1 class="slide-title" id="slide-title">Loading content...</h1>
            <p class="slide-message" id="slide-message">Fetching latest content from backend.</p>
            <div class="slide-meta-row">
              <div class="slide-caption" id="slide-caption"></div>
            </div>
          </div>
        </div>
      </section>

      <section class="announcement-section">
        <div class="section-label">Short announcements</div>
        <div class="announcement-list" id="announcement-list">
          <div class="announcement-card">
            <strong>Loading announcements...</strong>
          </div>
        </div>
      </section>
    </main>

    <div class="news-ticker" aria-live="polite">
      <span class="ticker-label">Latest</span>
      <div class="ticker-track">
        <div class="ticker-content" id="ticker-content"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
